<div class="aum-wrapper">
  <h2>User Management</h2>
  <div class="toolbar">
    <input type="text" [(ngModel)]="search" placeholder="Search by email..." (keyup.enter)="loadUsers()" />
    <button (click)="loadUsers()">Search</button>
  </div>
  <table class="data-table">
    <thead>
      <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody>
      @for (u of users(); track u.userId) {
        <tr>
          <td>{{ u.firstName }} {{ u.lastName }}</td>
          <td>{{ u.email }}</td>
          <td><span class="badge" [class]="u.role.toLowerCase()">{{ u.role }}</span></td>
          <td><span class="badge" [class]="u.status ? 'active' : 'inactive'">{{ u.status ? 'Active' : 'Inactive' }}</span></td>
          <td>
            <button class="btn-sm" (click)="toggleStatus(u.userId, u.status)" [disabled]="!u.status">Deactivate</button>
            <button class="btn-sm green" (click)="toggleStatus(u.userId, u.status)" [disabled]="u.status">Activate</button>
            <button class="btn-sm danger" (click)="deleteUser(u.userId)">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr><td colspan="5" class="empty">No users found.</td></tr>
      }
    </tbody>
  </table>
  <div class="pagination">
    @for (p of pages(); track p) {
      <button [class.active]="currentPage() === p" (click)="goToPage(p)">{{ p + 1 }}</button>
    }
  </div>
</div>
