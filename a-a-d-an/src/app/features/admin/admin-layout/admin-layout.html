<div class="adm-shell" [class.collapsed]="!sidebarOpen()">
  <aside class="adm-sidebar">
    <div class="adm-brand">
      <div class="adm-brand-icon">A</div>
      <span class="adm-brand-text">Admin Panel</span>
    </div>

    <nav class="adm-nav">
      <p class="adm-nav-label">MANAGEMENT</p>
      @for (item of navItems; track item.route) {
        <a class="adm-nav-item" [routerLink]="item.route" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.route === '/admin' }">
          <span class="adm-nav-icon">
            @switch (item.icon) {
              @case ('grid') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              }
              @case ('users') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
              }
              @case ('store') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              }
              @case ('star') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              }
              @case ('chart') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              }
              @case ('log') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              }
              @default {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
              }
            }
          </span>
          <span class="adm-nav-text">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="adm-sidebar-footer">
      <a routerLink="/home" class="adm-nav-item">
        <span class="adm-nav-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        </span>
        <span class="adm-nav-text">Back to Site</span>
      </a>
      <button class="adm-logout" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="adm-nav-text">Logout</span>
      </button>
    </div>
  </aside>

  <div class="adm-main">
    <header class="adm-header">
      <button class="adm-hamburger" (click)="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="adm-header-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Administrator
      </div>
    </header>

    <main class="adm-content">
      <router-outlet />
    </main>
  </div>
</div>
