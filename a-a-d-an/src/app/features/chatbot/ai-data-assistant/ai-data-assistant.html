<div class="chat-page">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="bot-avatar">🤖</div>
      <div>
        <h2 class="bot-name">DataPulse AI</h2>
        <span class="bot-status">● Ready to analyze</span>
      </div>
    </div>
  </div>

  <div class="chat-messages" #chatMessages>
    @for (msg of messages(); track $index) {
      <div class="message-row" [class.user-row]="msg.role === 'user'">
        @if (msg.role === 'bot') {
          <div class="msg-avatar bot-av">🤖</div>
        }
        <div class="msg-bubble" [class.user-bubble]="msg.role === 'user'" [class.bot-bubble]="msg.role === 'bot'">
          <p class="msg-text">{{ msg.content }}</p>
          @if (msg.plotlyJson) {
            <div class="plotly-chart" [attr.data-json]="msg.plotlyJson"></div>
          }
        </div>
        @if (msg.role === 'user') {
          <div class="msg-avatar user-av">U</div>
        }
      </div>
    }
    @if (loading()) {
      <div class="message-row">
        <div class="msg-avatar bot-av">🤖</div>
        <div class="msg-bubble bot-bubble">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    }
    <div #messagesEnd></div>
  </div>

  @if (messages().length <= 1) {
    <div class="suggestions">
      @for (s of suggestions; track s) {
        <button class="suggestion-chip" (click)="send(s)">{{ s }}</button>
      }
    </div>
  }

  <form class="chat-input-row" (ngSubmit)="send()">
    <input [(ngModel)]="input" name="q" placeholder="Ask me to analyze and visualize your data..."
           [disabled]="loading()" class="chat-input" autocomplete="off" />
    <button type="submit" class="send-btn" [disabled]="!input.trim() || loading()">
      ▶
    </button>
  </form>
</div>
